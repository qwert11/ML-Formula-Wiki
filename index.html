<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Formula Wiki — шпаргалка по формулам машинного обучения</title>

  <script>
    (() => {
      const savedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
    })();
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"

  <link rel="stylesheet" href="styles.css">

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
          integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
  <script defer src="data/formulas.js"></script>
  <script defer src="data/formulas-page-80.js"></script>
  <script defer src="app.js"></script>
</head>
<body>

    <div class="header-content">
      <div>
        <h1>ML Formula Wiki</h1>

      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Переключить цветовую тему" title="Переключить цветовую тему">
        <span class="theme-icon" aria-hidden="true">🌙</span>
        <span class="theme-label">Тёмная</span>

  <main id="app">

  </main>

  <footer class="site-footer">
    <p>Источник: Себастьян Рашка, «Python и машинное обучение». Здесь только формулы и авторские описания.</p>

</html>
